    tree_path: "data/eval/dengue_e.nwk"
    n_seqs: 200
    family: "Flaviviridae"
  hcv_e2:
    aln_path: "data/eval/hcv_e2.fasta"
    tree_path: "data/eval/hcv_e2.nwk"
